name: Compute UMAP

on:
  schedule:
    - cron: '0 3 * * 0'  # weekly, Sunday 3am UTC
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'prod'
        type: choice
        options: [prod, staging]

jobs:
  umap:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: recipe-lanes

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: recipe-lanes/scripts/python/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/python/requirements.txt

      - name: Write service account
        run: |
          if [ "${{ inputs.environment }}" = "staging" ]; then
            echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_STAGING }}' > staging-service-account.json
          else
            echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_PROD }}' > prod-service-account.json
          fi

      - name: Run UMAP
        run: |
          if [ "${{ inputs.environment }}" = "staging" ]; then
            python scripts/python/umap_icons.py --staging
          else
            python scripts/python/umap_icons.py
          fi

      - name: Clean up credentials
        if: always()
        run: rm -f prod-service-account.json staging-service-account.json
