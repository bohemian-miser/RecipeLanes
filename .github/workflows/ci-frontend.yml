name: Frontend CI

on:
  pull_request:
    branches:
      - main
      - staging
    paths:
      - 'recipe-rpg-simple/**'
      - '!recipe-rpg-simple/functions/**'

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: recipe-rpg-simple
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: recipe-rpg-simple/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Firebase Tools
        run: |
          npm install -g firebase-tools
          firebase experiments:enable webframeworks

      - name: Start Emulators
        run: |
          # Start in background with demo project
          firebase emulators:start --only auth,firestore,storage --project demo-project &
          echo "Waiting for emulators..."
          npx wait-on http://127.0.0.1:9099 --timeout 60000

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Build Frontend
        run: npm run build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: "mock-key"
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: "mock-project.firebaseapp.com"
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: "mock-project"
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: "mock-project.firebasestorage.app"
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "123456789"
          NEXT_PUBLIC_FIREBASE_APP_ID: "1:123456789:web:abcdef"

      - name: Run Tests
        run: npm test
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: "demo-project"
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: "demo-project.firebasestorage.app"
          NEXT_PUBLIC_USE_FIREBASE_EMULATOR: "true"
          FIREBASE_AUTH_EMULATOR_HOST: "127.0.0.1:9099"
          FIRESTORE_EMULATOR_HOST: "127.0.0.1:8080"
          STORAGE_EMULATOR_HOST: "127.0.0.1:9199"
