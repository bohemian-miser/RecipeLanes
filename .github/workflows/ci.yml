name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: recipe-rpg-simple/package-lock.json

      - name: Install dependencies
        run: cd recipe-rpg-simple && npm ci

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Firebase Tools
        run: |
          npm install -g firebase-tools
          firebase experiments:enable webframeworks

      - name: Start Emulators
        run: |
          cd recipe-rpg-simple
          # Start in background with demo project to avoid login requirement
          firebase emulators:start --only auth,firestore,storage --project demo-project &
          echo "Waiting for emulators..."
          npx wait-on http://127.0.0.1:9099 --timeout 60000

      - name: Install Playwright Browsers
        run: cd recipe-rpg-simple && npx playwright install --with-deps

      - name: Build
        run: cd recipe-rpg-simple && npm run build
        env:
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}

      - name: Test
        run: cd recipe-rpg-simple && npm test
        env:
          FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
