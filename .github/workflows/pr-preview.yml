name: PR Cloud Run Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

# One in-flight deploy per PR; cancel superseded builds.
concurrency:
  group: pr-preview-${{ github.event.number }}
  cancel-in-progress: true

permissions:
  pull-requests: write
  issues: write
  contents: read
  id-token: write

env:
  GCP_PROJECT: recipe-lanes-staging
  REGION: us-central1
  SERVICE: recipe-lanes-preview
  # Artifact Registry repo (must exist; see docs/agent-isolation-roadmap.md).
  AR_REPO: preview

jobs:
  # Backend-touching PRs get NO shared-staging preview: they need an exclusive
  # staging lease instead (deploying their functions/rules could break every
  # other open preview that shares the staging backend).
  detect-backend-changes:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.diff.outputs.backend }}
    steps:
      - name: Check PR diff for backend paths
        id: diff
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          FILES=$(gh api "repos/${{ github.repository }}/pulls/${{ github.event.number }}/files" \
            --paginate --jq '.[].filename')
          echo "$FILES"
          if echo "$FILES" | grep -qE '^recipe-lanes/(functions/|firestore\.rules$|firestore\.indexes\.json$|storage\.rules$)'; then
            echo "backend=true" >> "$GITHUB_OUTPUT"
            echo "Backend paths touched -> preview skipped, staging lease required."
          else
            echo "backend=false" >> "$GITHUB_OUTPUT"
          fi

  needs-staging-lease:
    needs: detect-backend-changes
    if: github.event.action != 'closed' && needs.detect-backend-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Label PR needs-staging-lease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create needs-staging-lease \
            --repo "${{ github.repository }}" \
            --color D93F0B \
            --description "Touches backend (functions/rules/indexes); needs exclusive staging validation" \
            2>/dev/null || true
          gh pr edit "${{ github.event.number }}" \
            --repo "${{ github.repository }}" \
            --add-label needs-staging-lease

      - name: Post sticky skip comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: cloud-run-preview
          message: |
            ### Cloud Run preview skipped — staging lease required

            This PR changes backend resources (`recipe-lanes/functions/**`, Firestore/Storage
            rules, or Firestore indexes). Per-PR previews all share the staging Firebase
            backend, so backend changes cannot be previewed in parallel.

            Instead, this PR needs **exclusive staging validation**: take the staging
            lease, deploy the backend changes to `staging`, and verify there before merge.
            The `needs-staging-lease` label has been added.

            _Commit:_ `${{ github.sha }}`

  deploy:
    needs: detect-backend-changes
    if: github.event.action != 'closed' && needs.detect-backend-changes.outputs.backend == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_STAGING }}

      - uses: google-github-actions/setup-gcloud@v2

      # Single source of truth: read the plain NEXT_PUBLIC_* values straight from
      # the committed apphosting.staging.yaml (same values prod/staging inline).
      # setup-gcloud provides no yq; use a tiny node parser (no extra deps).
      - name: Read NEXT_PUBLIC_* build args from apphosting.staging.yaml
        id: cfg
        working-directory: recipe-lanes
        run: |
          node -e '
            const fs = require("fs");
            const txt = fs.readFileSync("apphosting.staging.yaml", "utf8");
            const want = [
              "NEXT_PUBLIC_FIREBASE_API_KEY",
              "NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN",
              "NEXT_PUBLIC_FIREBASE_PROJECT_ID",
              "NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET",
              "NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID",
              "NEXT_PUBLIC_FIREBASE_APP_ID",
            ];
            const out = [];
            let cur = null;
            for (const raw of txt.split("\n")) {
              const v = raw.match(/^\s*-\s*variable:\s*(\S+)/);
              if (v) { cur = v[1]; continue; }
              const val = raw.match(/^\s*value:\s*(.*)$/);
              if (val && cur && want.includes(cur)) {
                let s = val[1].trim().replace(/^["\x27]|["\x27]$/g, "");
                out.push(`${cur}=${s}`);
              }
            }
            fs.appendFileSync(process.env.GITHUB_OUTPUT, "args<<EOF\n" + out.join("\n") + "\nEOF\n");
          '

      # icon_index.json already lives under recipe-lanes/functions/... in the repo,
      # so it is inside the build context. prebuild.js tolerates its absence anyway.

      - name: Ensure Artifact Registry repo exists
        run: |
          gcloud artifacts repositories describe "$AR_REPO" \
            --project "$GCP_PROJECT" --location "$REGION" >/dev/null 2>&1 || \
          gcloud artifacts repositories create "$AR_REPO" \
            --project "$GCP_PROJECT" --location "$REGION" \
            --repository-format=docker

      - name: Build and push image
        id: build
        working-directory: recipe-lanes
        run: |
          IMAGE="${REGION}-docker.pkg.dev/${GCP_PROJECT}/${AR_REPO}/${SERVICE}:pr-${{ github.event.number }}-${{ github.sha }}"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          # docker build (not `gcloud builds submit --tag`, which does NOT accept
          # --build-arg). The NEXT_PUBLIC_* values must be build args so next build
          # inlines them. Push to Artifact Registry via the gcloud cred helper.
          gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet
          BUILD_ARGS=()
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            BUILD_ARGS+=(--build-arg "$line")
          done <<'ARGS'
          ${{ steps.cfg.outputs.args }}
          ARGS
          BUILD_ARGS+=(--build-arg NEXT_PUBLIC_ENV_NAME=preview)
          docker build "${BUILD_ARGS[@]}" -t "$IMAGE" .
          docker push "$IMAGE"

      - name: Deploy to Cloud Run (tagged, no traffic)
        id: deploy
        run: |
          # --no-traffic is only valid when the service already exists. On the
          # first-ever deploy of the shared preview service it must be omitted;
          # the new revision then takes traffic on the main service URL (harmless
          # — previews are accessed via the tagged pr-N URL). Every later deploy
          # keeps --no-traffic.
          NOTRAFFIC="--no-traffic"
          if ! gcloud run services describe "$SERVICE" --project "$GCP_PROJECT" --region "$REGION" >/dev/null 2>&1; then
            NOTRAFFIC=""
          fi
          gcloud run deploy "$SERVICE" \
            --project "$GCP_PROJECT" --region "$REGION" \
            --image "${{ steps.build.outputs.image }}" \
            --tag "pr-${{ github.event.number }}" \
            $NOTRAFFIC \
            --allow-unauthenticated \
            --set-env-vars "NEXT_PUBLIC_ENV_NAME=preview,ADMIN_EMAILS=${{ secrets.ADMIN_EMAILS }}"
          URL=$(gcloud run services describe "$SERVICE" \
            --project "$GCP_PROJECT" --region "$REGION" \
            --format="value(status.traffic.url)" \
            --filter="status.traffic.tag=pr-${{ github.event.number }}" | head -n1)
          if [ -z "$URL" ]; then
            URL=$(gcloud run services describe "$SERVICE" \
              --project "$GCP_PROJECT" --region "$REGION" \
              --format="json" | node -e '
                const d=JSON.parse(require("fs").readFileSync(0,"utf8"));
                const t=(d.status?.traffic||[]).find(x=>x.tag==="pr-${{ github.event.number }}");
                if(t?.url)process.stdout.write(t.url);')
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Register preview host as authorized Firebase Auth domain
        run: |
          set -euo pipefail
          URL="${{ steps.deploy.outputs.url }}"
          if [ -z "$URL" ]; then
            echo "::error::Cloud Run deploy produced no URL; cannot register authorized domain."
            exit 1
          fi
          # Strip scheme and any trailing path to get just the hostname.
          HOST="${URL#https://}"
          HOST="${HOST#http://}"
          HOST="${HOST%%/*}"
          echo "Registering authorized domain: $HOST"

          TOKEN=$(gcloud auth print-access-token)
          CONFIG_URL="https://identitytoolkit.googleapis.com/admin/v2/projects/${GCP_PROJECT}/config"

          ATTEMPTS=5
          SUCCESS=false
          for i in $(seq 1 "$ATTEMPTS"); do
            GET_RESP=$(curl -sS -w '\n%{http_code}' -X GET "$CONFIG_URL" \
              -H "Authorization: Bearer ${TOKEN}")
            GET_BODY=$(echo "$GET_RESP" | sed '$d')
            GET_CODE=$(echo "$GET_RESP" | tail -n1)

            if [ "$GET_CODE" = "403" ]; then
              echo "::error::Permission denied (403) reading Identity Toolkit config for project ${GCP_PROJECT}. The FIREBASE_SERVICE_ACCOUNT_STAGING service account needs a role with firebaseauth.configs.update (e.g. roles/firebaseauth.admin)."
              exit 1
            fi
            if [ "$GET_CODE" -lt 200 ] || [ "$GET_CODE" -ge 300 ]; then
              echo "GET failed with status $GET_CODE (attempt $i/$ATTEMPTS); retrying..."
              sleep 3
              continue
            fi

            NEW_DOMAINS=$(echo "$GET_BODY" | jq -c --arg host "$HOST" \
              '((.authorizedDomains // []) + [$host]) | unique')

            PATCH_RESP=$(curl -sS -w '\n%{http_code}' -X PATCH \
              "${CONFIG_URL}?updateMask=authorizedDomains" \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "Content-Type: application/json" \
              -d "$(jq -nc --argjson domains "$NEW_DOMAINS" '{authorizedDomains: $domains}')")
            PATCH_BODY=$(echo "$PATCH_RESP" | sed '$d')
            PATCH_CODE=$(echo "$PATCH_RESP" | tail -n1)

            if [ "$PATCH_CODE" = "403" ]; then
              echo "::error::Permission denied (403) updating Identity Toolkit config for project ${GCP_PROJECT}. The FIREBASE_SERVICE_ACCOUNT_STAGING service account needs a role with firebaseauth.configs.update (e.g. roles/firebaseauth.admin)."
              exit 1
            fi
            if [ "$PATCH_CODE" -ge 200 ] && [ "$PATCH_CODE" -lt 300 ]; then
              echo "Authorized domain '$HOST' registered."
              SUCCESS=true
              break
            fi

            echo "PATCH failed with status $PATCH_CODE (attempt $i/$ATTEMPTS); response: $PATCH_BODY"
            echo "Retrying (likely a concurrent-update race with another PR preview)..."
            sleep 3
          done

          if [ "$SUCCESS" != "true" ]; then
            echo "::error::Failed to register authorized domain '$HOST' after ${ATTEMPTS} attempts."
            exit 1
          fi

      - name: Post sticky preview comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: cloud-run-preview
          message: |
            ### Cloud Run preview ready

            **URL:** ${{ steps.deploy.outputs.url }}
            **Commit:** `${{ github.sha }}`
            **Service:** `recipe-lanes-preview` (tag `pr-${{ github.event.number }}`) on `recipe-lanes-staging`

            > Preview shares staging Firestore / Auth / Storage — treat data as shared.

  teardown:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_STAGING }}

      - uses: google-github-actions/setup-gcloud@v2

      # Resource cleanup (Cloud Run tag + Artifact Registry images) is the
      # critical, must-not-skip half of teardown: leaving these behind is what
      # actually orphans preview infrastructure. It now runs FIRST and
      # unconditionally (if: always()), so a failure anywhere later in this
      # job (e.g. in the best-effort Auth-domain cleanup below) can never
      # again prevent it from executing. Previously the domain-deregister step
      # ran first with `set -euo pipefail`; when its own initial `gcloud run
      # services describe ... | head -n1` lookup failed (the exit code
      # propagated through the pipe, under pipefail, into the `URL=$(...)`
      # assignment), `set -e` aborted the whole step *before* any of its own
      # diagnostics printed, and the job stopped there — "Remove preview tag"
      # and "Delete pushed preview images" never ran, orphaning the previews
      # for PR #198 and #199.
      - name: Remove preview tag
        if: always()
        run: |
          gcloud run services update-traffic "$SERVICE" \
            --project "$GCP_PROJECT" --region "$REGION" \
            --remove-tags "pr-${{ github.event.number }}" || \
            echo "No tag pr-${{ github.event.number }} to remove; skipping."

      - name: Delete pushed preview images
        if: always()
        run: |
          IMAGE_PATH="${REGION}-docker.pkg.dev/${GCP_PROJECT}/${AR_REPO}/${SERVICE}"
          gcloud artifacts docker tags list "$IMAGE_PATH" \
            --filter="tag.basename()~^pr-${{ github.event.number }}-" \
            --format="value(tag.basename())" 2>/dev/null | while read -r TAG; do
            [ -z "$TAG" ] && continue
            gcloud artifacts docker images delete "${IMAGE_PATH}:${TAG}" \
              --delete-tags --quiet || true
          done

      # Best-effort domain cleanup. Deliberately NOT `set -e`: this step must
      # never be able to abort mid-way, and — more importantly — must never
      # again be allowed to block the resource cleanup above (which is why it
      # also now runs last). `continue-on-error: true` is a second layer of
      # defense: even an unanticipated failure here (bad token, transient
      # network error, gcloud CLI regression) can only fail *this* step, never
      # the job, and never the steps before it.
      #
      # Safety guard (see the incident this fixes): a bug in the read-modify-
      # write PATCH once wiped `authorizedDomains` to an empty list and took
      # down all logins across staging (`TypeError: t is not iterable` in
      # validate_origin). This step now refuses to PATCH unless: the GET
      # parsed as a JSON array, that array was non-empty, and the computed new
      # list removes at most the single intended host and is not itself empty.
      - name: Deregister preview host from authorized Firebase Auth domains
        if: always()
        continue-on-error: true
        run: |
          set -uo pipefail
          # No `-e` here on purpose (see comment above): every fallible
          # command below is checked explicitly, so a failure logs a clear
          # message and this step exits 0 (best-effort) instead of dying
          # silently partway through — which is exactly what orphaned #198/#199.

          URL=$(gcloud run services describe "$SERVICE" \
            --project "$GCP_PROJECT" --region "$REGION" \
            --format="value(status.traffic.url)" \
            --filter="status.traffic.tag=pr-${{ github.event.number }}" 2>/dev/null | head -n1)
          if [ -z "$URL" ]; then
            URL=$(gcloud run services describe "$SERVICE" \
              --project "$GCP_PROJECT" --region "$REGION" \
              --format="json" 2>/dev/null | node -e '
                const d=JSON.parse(require("fs").readFileSync(0,"utf8"));
                const t=(d.status?.traffic||[]).find(x=>x.tag==="pr-${{ github.event.number }}");
                if(t?.url)process.stdout.write(t.url);' 2>/dev/null)
          fi
          if [ -z "$URL" ]; then
            echo "No tagged URL found for pr-${{ github.event.number }} (already removed, or lookup failed); nothing to deregister."
            exit 0
          fi
          HOST="${URL#https://}"
          HOST="${HOST#http://}"
          HOST="${HOST%%/*}"
          echo "Deregistering authorized domain: $HOST"

          TOKEN=$(gcloud auth print-access-token) || {
            echo "::warning::Could not obtain access token; skipping Auth-domain deregistration (best-effort)."
            exit 0
          }
          CONFIG_URL="https://identitytoolkit.googleapis.com/admin/v2/projects/${GCP_PROJECT}/config"

          ATTEMPTS=5
          SUCCESS=false
          for i in $(seq 1 "$ATTEMPTS"); do
            GET_RESP=$(curl -sS -w '\n%{http_code}' -X GET "$CONFIG_URL" \
              -H "Authorization: Bearer ${TOKEN}")
            GET_BODY=$(echo "$GET_RESP" | sed '$d')
            GET_CODE=$(echo "$GET_RESP" | tail -n1)

            if [ "$GET_CODE" = "403" ]; then
              echo "::warning::Permission denied (403) reading Identity Toolkit config for project ${GCP_PROJECT}. The FIREBASE_SERVICE_ACCOUNT_STAGING service account needs a role with firebaseauth.configs.update (e.g. roles/firebaseauth.admin). Skipping (best-effort)."
              exit 0
            fi
            if [ "$GET_CODE" -lt 200 ] || [ "$GET_CODE" -ge 300 ]; then
              echo "GET failed with status $GET_CODE (attempt $i/$ATTEMPTS); retrying..."
              sleep 3
              continue
            fi

            # --- Safety guard: validate the snapshot before computing anything. ---
            OLD_DOMAINS=$(echo "$GET_BODY" | jq -c '.authorizedDomains // empty' 2>/dev/null)
            if [ -z "$OLD_DOMAINS" ]; then
              echo "::warning::Could not parse a non-empty authorizedDomains array from the GET response; refusing to PATCH. Body: $GET_BODY"
              exit 0
            fi
            OLD_COUNT=$(echo "$OLD_DOMAINS" | jq 'length' 2>/dev/null)
            if [ -z "$OLD_COUNT" ] || [ "$OLD_COUNT" -lt 1 ]; then
              echo "::warning::authorizedDomains snapshot is empty or unparseable (count=$OLD_COUNT); refusing to PATCH to avoid wiping the list."
              exit 0
            fi

            NEW_DOMAINS=$(echo "$OLD_DOMAINS" | jq -c --arg host "$HOST" \
              '[.[] | select(. != $host)]' 2>/dev/null)
            if [ -z "$NEW_DOMAINS" ]; then
              echo "::warning::Failed to compute updated domain list; refusing to PATCH."
              exit 0
            fi
            NEW_COUNT=$(echo "$NEW_DOMAINS" | jq 'length' 2>/dev/null)
            if [ -z "$NEW_COUNT" ]; then
              echo "::warning::Could not determine size of updated domain list; refusing to PATCH."
              exit 0
            fi
            # Removing one host must remove at most one entry, and must never
            # empty the list. Refuse the PATCH if either invariant is violated.
            if [ "$NEW_COUNT" -lt 1 ] || [ "$NEW_COUNT" -lt "$((OLD_COUNT - 1))" ]; then
              echo "::warning::Refusing to PATCH authorizedDomains: would shrink from $OLD_COUNT to $NEW_COUNT entries (removing '$HOST' should drop at most 1). Leaving the list untouched."
              exit 0
            fi
            if [ "$NEW_COUNT" -eq "$OLD_COUNT" ]; then
              echo "Host '$HOST' was not present in authorizedDomains; nothing to remove."
              SUCCESS=true
              break
            fi

            PATCH_RESP=$(curl -sS -w '\n%{http_code}' -X PATCH \
              "${CONFIG_URL}?updateMask=authorizedDomains" \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "Content-Type: application/json" \
              -d "$(jq -nc --argjson domains "$NEW_DOMAINS" '{authorizedDomains: $domains}')")
            PATCH_BODY=$(echo "$PATCH_RESP" | sed '$d')
            PATCH_CODE=$(echo "$PATCH_RESP" | tail -n1)

            if [ "$PATCH_CODE" = "403" ]; then
              echo "::warning::Permission denied (403) updating Identity Toolkit config for project ${GCP_PROJECT}. Skipping (best-effort)."
              exit 0
            fi
            if [ "$PATCH_CODE" -ge 200 ] && [ "$PATCH_CODE" -lt 300 ]; then
              echo "Authorized domain '$HOST' removed ($OLD_COUNT -> $NEW_COUNT entries)."
              SUCCESS=true
              break
            fi

            echo "PATCH failed with status $PATCH_CODE (attempt $i/$ATTEMPTS); response: $PATCH_BODY"
            echo "Retrying (likely a concurrent-update race with another PR preview)..."
            sleep 3
          done

          if [ "$SUCCESS" != "true" ]; then
            echo "::warning::Failed to deregister authorized domain '$HOST' after ${ATTEMPTS} attempts (best-effort; not failing the job)."
          fi

      - name: Update sticky comment
        if: always()
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: cloud-run-preview
          message: |
            ### Cloud Run preview torn down

            The `pr-${{ github.event.number }}` preview tag has been removed.
