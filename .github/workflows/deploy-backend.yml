name: Deploy Backend

on:
  push:
    branches:
      - main
      - staging
    paths:
      - 'recipe-lanes/functions/**'
      - 'recipe-lanes/lib/**'
      - 'recipe-lanes/firestore.rules'
      - 'recipe-lanes/firestore.indexes.json'
      - 'recipe-lanes/storage.rules'

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: recipe-lanes
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: recipe-lanes/functions/package-lock.json

      - name: Install Function Dependencies
        run: |
          npm ci                # Install root dependencies first (for tsc resolution of ../lib)
          cd functions
          npm ci

      - name: Install Firebase Tools
        run: npm install -g firebase-tools

      - name: Authenticate to Google Cloud (Staging)
        if: github.ref == 'refs/heads/staging'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_STAGING }}

      - name: Authenticate to Google Cloud (Prod)
        if: github.ref == 'refs/heads/main'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PROD }}

      - name: Set Deploy Target (Staging)
        if: github.ref == 'refs/heads/staging'
        run: echo "DEPLOY_TARGET=staging" >> $GITHUB_ENV

      - name: Set Deploy Target (Prod)
        if: github.ref == 'refs/heads/main'
        run: echo "DEPLOY_TARGET=default" >> $GITHUB_ENV

      - name: Export Icon Index (Staging)
        if: github.ref == 'refs/heads/staging'
        run: npx tsx scripts/export-icon-index.ts --staging

      - name: Export Icon Index (Prod)
        if: github.ref == 'refs/heads/main'
        run: npx tsx scripts/export-icon-index.ts --prod

      - name: Deploy
        run: |
          firebase use $DEPLOY_TARGET
          firebase deploy --only functions,firestore:rules,firestore:indexes,storage
