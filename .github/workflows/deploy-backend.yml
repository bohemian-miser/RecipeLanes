name: Deploy Backend

on:
  push:
    branches:
      - main
      - staging
    paths:
      - 'recipe-rpg-simple/functions/**'
      - 'recipe-rpg-simple/firestore.rules'
      - 'recipe-rpg-simple/firestore.indexes.json'

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: recipe-rpg-simple
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: recipe-rpg-simple/functions/package-lock.json

      - name: Install Function Dependencies
        run: |
          cd functions
          npm ci

      - name: Install Firebase Tools
        run: npm install -g firebase-tools

      - name: Set Staging Environment
        if: github.ref == 'refs/heads/staging'
        run: |
          echo "FIREBASE_SERVICE_ACCOUNT_KEY=${{ secrets.FIREBASE_SERVICE_ACCOUNT_STAGING }}" >> $GITHUB_ENV
          echo "DEPLOY_TARGET=staging" >> $GITHUB_ENV

      - name: Set Production Environment
        if: github.ref == 'refs/heads/main'
        run: |
          echo "FIREBASE_SERVICE_ACCOUNT_KEY=${{ secrets.FIREBASE_SERVICE_ACCOUNT_PROD }}" >> $GITHUB_ENV
          echo "DEPLOY_TARGET=default" >> $GITHUB_ENV

      - name: Deploy
        run: |
          firebase use $DEPLOY_TARGET
          firebase deploy --only functions,firestore
