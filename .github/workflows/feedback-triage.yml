name: Feedback Triage

# Daily Gemini agent that turns new docs in the production `feedback`
# Firestore collection into GitHub issues (labeled `feedback` + bug or
# enhancement). The owner then routes an issue to a fixer agent by adding
# `agent-ready` (Claude) or `agent-ready-gemini` (Gemini).
#
# Each doc is marked in Firestore (triage.status = filed|skipped) right after
# it is handled, so re-runs never double-file. Prompt:
# .github/gemini/feedback-triage.md; Firestore CLI:
# recipe-lanes/scripts/feedback-triage.ts.
#
# Config: GEMINI_API_KEY, FIREBASE_SERVICE_ACCOUNT_PROD (Firestore
# read/write on `feedback`), and optionally the recipelanes-agent GitHub App
# (AGENT_APP_ID variable + AGENT_APP_PRIVATE_KEY secret; AGENT_GH_PAT as
# fallback) so issues are filed by recipelanes-agent[bot] consistently with
# the other agent workflows — GITHUB_TOKEN also works here.

on:
  schedule:
    - cron: '53 6 * * *'
  workflow_dispatch:

concurrency:
  group: feedback-triage
  cancel-in-progress: false

jobs:
  triage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    timeout-minutes: 20

    steps:
      - name: Mint agent token (GitHub App)
        id: agent_token
        if: vars.AGENT_APP_ID != ''
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.AGENT_APP_ID }}
          private-key: ${{ secrets.AGENT_APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (prod)
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PROD }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: recipe-lanes/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix recipe-lanes

      - name: Install Gemini CLI
        run: npm install -g @google/gemini-cli --silent

      # Gemini CLI strips token/credential-like env vars from the shells it
      # spawns, so everything the agent's commands need must live in files:
      # gh auth in hosts.yml, GCP creds at the ADC well-known path, and the
      # Firebase project id in recipe-lanes/.env (read by the script's dotenv).
      - name: Configure agent auth (file-based)
        env:
          APP_ID: ${{ vars.AGENT_APP_ID }}
          APP_PRIVATE_KEY: ${{ secrets.AGENT_APP_PRIVATE_KEY }}
          REPO: ${{ github.repository }}
          FALLBACK_TOKEN: ${{ secrets.AGENT_GH_PAT || github.token }}
        run: |
          if [ -n "$APP_ID" ]; then
            node .github/scripts/mint-app-token.mjs | gh auth login --with-token
          else
            printf '%s' "$FALLBACK_TOKEN" | gh auth login --with-token
          fi
          mkdir -p "$HOME/.config/gcloud"
          cp "$GOOGLE_APPLICATION_CREDENTIALS" "$HOME/.config/gcloud/application_default_credentials.json"
          echo "NEXT_PUBLIC_FIREBASE_PROJECT_ID=recipe-lanes" >> recipe-lanes/.env

      - name: Run triage agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_CLI_TRUST_WORKSPACE: 'true'
          GEMINI_MODEL: gemini-3.1-pro-preview
        run: |
          gemini --approval-mode=yolo -p "$(cat .github/gemini/feedback-triage.md)" 2>&1 | tee "$RUNNER_TEMP/gemini-run.log"

      - name: Collect and scrub agent logs
        if: always()
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          APP_TOKEN: ${{ steps.agent_token.outputs.token }}
          FALLBACK_TOKEN: ${{ secrets.AGENT_GH_PAT || github.token }}
        run: |
          mkdir -p "$RUNNER_TEMP/gemini-logs"
          cp "$RUNNER_TEMP/gemini-run.log" "$RUNNER_TEMP/gemini-logs/" 2>/dev/null || true
          # Gemini CLI session transcripts (full conversation + tool calls)
          cp -r "$HOME/.gemini/tmp" "$RUNNER_TEMP/gemini-logs/sessions" 2>/dev/null || true
          # Artifacts on a public repo are downloadable — scrub credentials.
          find "$RUNNER_TEMP/gemini-logs" -type f | while read -r f; do
            for s in "$GEMINI_API_KEY" "$APP_TOKEN" "$FALLBACK_TOKEN"; do
              [ -n "$s" ] && sed -i "s|$s|***SCRUBBED***|g" "$f" || true
            done
          done

      - name: Upload agent logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gemini-logs-${{ github.run_id }}
          path: ${{ runner.temp }}/gemini-logs/
          if-no-files-found: ignore
          retention-days: 30
