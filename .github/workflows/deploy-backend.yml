name: Deploy Backend

on:
  push:
    branches:
      - main
      - staging
    paths:
      - 'recipe-rpg-simple/functions/**'
      - 'recipe-rpg-simple/firestore.rules'
      - 'recipe-rpg-simple/firestore.indexes.json'
      - 'recipe-rpg-simple/storage.rules'

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: recipe-rpg-simple
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: recipe-rpg-simple/functions/package-lock.json

      - name: Install Function Dependencies
        run: |
          npm install --no-save @types/pngjs    # In parent dir for shared lib
          cd functions
          npm ci

      - name: Install Firebase Tools
        run: npm install -g firebase-tools

      - name: Authenticate to Google Cloud (Staging)
        if: github.ref == 'refs/heads/staging'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_STAGING }}

      - name: Authenticate to Google Cloud (Prod)
        if: github.ref == 'refs/heads/main'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PROD }}

      - name: Set Deploy Target (Staging)
        if: github.ref == 'refs/heads/staging'
        run: echo "DEPLOY_TARGET=staging" >> $GITHUB_ENV

      - name: Set Deploy Target (Prod)
        if: github.ref == 'refs/heads/main'
        run: echo "DEPLOY_TARGET=default" >> $GITHUB_ENV

      - name: Deploy
        run: |
          firebase use $DEPLOY_TARGET
          firebase deploy --only functions,firestore:rules,firestore:indexes,storage
