# Log-based counter metric: icon_forged_count
#
# Consumed by `gcloud logging metrics create/update icon_forged_count
#   --config-from-file=log-metric.icon_forged_count.yaml`
#
# Counter metric: one increment per matching log entry (no value extractor).
# Filter is kept byte-for-byte in sync with docs/alerting-icon-forge.md.
name: icon_forged_count
description: Count of successful icon generations (Bug 171 alerting)
filter: |-
  resource.type="cloud_run_revision"
  resource.labels.service_name="processicontask"
  jsonPayload.event="icon_forged"
