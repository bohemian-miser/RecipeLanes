name: Gemini Autonomous Issue Solver

on:
  schedule:
    # Run hourly at the start of every hour
    - cron: '0 * * * *'
  workflow_dispatch:
    # Allows manual triggering from the GitHub UI with an optional issue override
    inputs:
      issue_number:
        description: 'Target Issue Number (leave blank for priority order)'
        required: false
        type: string

jobs:
  solve-issue:
    runs-on: ubuntu-latest
    
    # Securely pin permissions for GITHUB_TOKEN to write commits, PRs, and issue comments
    permissions:
      contents: write
      pull-requests: write
      issues: write
    
    # Enforce a hard run timeout to strictly control costs / runtime
    timeout-minutes: 25

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history so git operations (branching, tracking) work correctly

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: recipe-lanes/package-lock.json

      - name: Install Firebase CLI & Java (for emulator pre-checks if needed)
        run: |
          sudo npm install -g firebase-tools
          sudo apt-get update && sudo apt-get install -y default-jr@v1.0.0 || sudo apt-get install -y default-jre

      - name: Install Gemini CLI
        run: npm install -g @google/gemini-cli --silent

      - name: Configure Git
        run: |
          git config --global user.name "gemini-bot[bot]"
          git config --global user.email "gemini-bot@users.noreply.github.com"

      - name: Run Autonomous Issue Solver
        env:
          # Use the repository-scoped API key to leverage token caching on Google's servers (extremely cheap!)
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Bypasses the interactive workspace trust prompt
          GEMINI_CLI_TRUST_WORKSPACE: "true"
          # Pass GitHub token to allow creating PRs and comments
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Formulate the prompt based on whether an issue number was supplied manually
          if [ -n "${{ github.event.inputs.issue_number }}" ]; then
            PROMPT="/resolve-issue ${{ github.event.inputs.issue_number }}"
          else
            PROMPT="/resolve-issue"
          fi
          
          echo "Executing: gemini --approval-mode=yolo -p \"$PROMPT\""
          
          # Run Gemini CLI in headless YOLO mode (auto-approves editing and shell commands)
          gemini --approval-mode=yolo -p "$PROMPT"
