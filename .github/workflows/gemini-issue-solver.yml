name: Gemini Issue Solver

# Autonomous Gemini worker: picks ONE open issue labeled `agent-ready-gemini`
# per run, fixes it with tests, opens a PR, and watches CI. Mirrors the Claude
# cloud routine (which owns the `agent-ready` label). Runs at :37 to stay off
# the Claude routine's :17 cadence.
#
# Secrets required:
#   GEMINI_API_KEY  — Gemini API key for the CLI.
#   AGENT_GH_PAT    — fine-grained PAT (contents: rw, pull-requests: rw,
#                     issues: rw). REQUIRED: PRs opened with the default
#                     GITHUB_TOKEN do not trigger CI workflows, so without it
#                     the agent's PRs never get checks and every run fails its
#                     "wait for CI" gate.

on:
  schedule:
    - cron: '37 * * * *'
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Target issue number (blank = oldest eligible agent-ready-gemini issue)'
        required: false
        type: string

# Never run two Gemini agent jobs at once (solver or comment responder) —
# they share branches and the dedup logic assumes serial runs.
concurrency:
  group: gemini-agent
  cancel-in-progress: false

jobs:
  solve-issue:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Push/PR with the PAT so CI triggers on the agent's PRs.
          token: ${{ secrets.AGENT_GH_PAT || github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: recipe-lanes/package-lock.json

      - name: Install Gemini CLI
        run: npm install -g @google/gemini-cli --silent

      - name: Configure Git
        run: |
          git config --global user.name "gemini-bot"
          git config --global user.email "gemini-bot@users.noreply.github.com"

      - name: Run issue solver
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_CLI_TRUST_WORKSPACE: 'true'
          GH_TOKEN: ${{ secrets.AGENT_GH_PAT || github.token }}
          GITHUB_TOKEN: ${{ secrets.AGENT_GH_PAT || github.token }}
        run: |
          if [ -n "${{ github.event.inputs.issue_number }}" ]; then
            PROMPT="/resolve-issue ${{ github.event.inputs.issue_number }}"
          else
            PROMPT="/resolve-issue"
          fi
          echo "Executing: gemini --approval-mode=yolo -p \"$PROMPT\""
          gemini --approval-mode=yolo -p "$PROMPT"
