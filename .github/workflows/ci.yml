name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: recipe-rpg-simple/package-lock.json

      - name: Install dependencies
        run: cd recipe-rpg-simple && npm ci

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Firebase Tools
        run: |
          npm install -g firebase-tools
          firebase experiments:enable webframeworks

      - name: Install Playwright Browsers
        run: cd recipe-rpg-simple && npx playwright install --with-deps

      - name: Build
        run: cd recipe-rpg-simple && npm run build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: "demo-key"
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: "local-project-id.firebaseapp.com"
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: "local-project-id"
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: "local-project-id.firebasestorage.app"
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "123456789"
          NEXT_PUBLIC_FIREBASE_APP_ID: "1:123456789:web:abcdef"

      - name: Test
        run: cd recipe-rpg-simple && npm test
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: "demo-key"
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: "local-project-id"
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: "local-project-id.firebasestorage.app"
          NEXT_PUBLIC_USE_FIREBASE_EMULATOR: "true"
          # Emulator Hosts are set by firebase emulators:exec in test script
          # But we can set defaults if needed
          GEMINI_API_KEY: "mock-key" # MOCK_AI=true so this isn't used real

